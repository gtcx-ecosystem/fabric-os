# =============================================================================
# AaaS Cadence — AAAS-S3
# =============================================================================
# Nightly assurance heartbeat: refreshes the fabric-os friction + honesty
# witnesses and reports witness freshness, so audits stop being on-demand and
# stale witnesses (audit finding ASR-007) surface as a visible signal.
#
# Advisory: does not block (five-pillar refresh is bridge-delegated). The witness
# is uploaded as an artifact each run.
# =============================================================================

name: AaaS Cadence

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aaas-cadence
  cancel-in-progress: true

jobs:
  cadence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20.18.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: AaaS cadence — refresh witnesses + freshness check
        run: pnpm aaas:cadence:write

      - name: Upload cadence witness
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aaas-cadence-${{ github.run_id }}
          path: audit/evidence/aaas-cadence-latest.json
