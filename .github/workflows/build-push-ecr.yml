# Retired production-critical GitHub Actions path.
#
# GitHub is SCM/review only while billing is locked. Image build/push and
# production deploy execution are owned by Fabric CodeBuild + Argo CD.
#
# Keep the ecr_repos lines below for the local workflow image contract checker;
# this workflow intentionally performs no AWS, Docker, kubectl, or deploy work.

name: Retired - ECR Build Mapping

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: protocols
            ecr_repos: gtcx-protocols
          - name: agx
            ecr_repos: gtcx-agx
          - name: sovereign
            ecr_repos: gtcx-sovereign
          - name: baselineos
            ecr_repos: baselineos
          - name: compliance-gateway
            ecr_repos: compliance-gateway
    steps:
      - name: Retired path notice
        run: |
          echo "This GitHub Actions build/push path is retired."
          echo "Use fabric-os CodeBuild deployment execution and Argo CD delivery."
