# Retired GitHub Actions staging deploy path.
#
# Staging deployment execution is owned by AWS CodeBuild + Argo CD, not GitHub
# Actions, while the billing lock is unresolved.

name: Retired - Staging Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    runs-on: ubuntu-latest
    steps:
      - name: Retired path notice
        run: |
          echo "This GitHub Actions staging deploy path is retired."
          echo "Use pnpm deployment:codebuild:start -- --environment=staging --mode=plan --write."
