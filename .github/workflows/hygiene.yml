# Sibling-repo template — checks out bridge-os for the CLI until @gtcx/hygiene is published.
name: Hygiene
on:
  push:
    branches: [main]
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout hygiene tool
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: gtcx-ecosystem/bridge-os
          path: bridge-os
          sparse-checkout: |
            platform/tools/hygiene
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.18.0'

      - name: Build hygiene CLI
        working-directory: bridge-os
        run: |
          pnpm install --frozen-lockfile --filter @gtcx/hygiene...
          pnpm --filter @gtcx/hygiene build

      - name: Run hygiene check
        run: node bridge-os/platform/tools/hygiene/dist/cli.js check
