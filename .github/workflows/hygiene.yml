# Sibling-repo template — checks out bridge-os for the CLI until @gtcx/hygiene is published.
name: Hygiene
on:
  push:
    branches: [main]
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout hygiene tool
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: gtcx-ecosystem/bridge-os
          path: bridge-os
          sparse-checkout: |
            platform/tools/hygiene
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20.18.0'

      - name: Build hygiene CLI
        working-directory: bridge-os
        run: |
          pnpm install --frozen-lockfile --filter @gtcx/hygiene...
          pnpm --filter @gtcx/hygiene build

      - name: Run hygiene check
        run: node bridge-os/platform/tools/hygiene/dist/cli.js check
