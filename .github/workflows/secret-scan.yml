# =============================================================================
# Secret Scanning — TruffleHog
# =============================================================================
# Scans repository for leaked secrets, API keys, tokens, and credentials.
# Fails CI if any verified secrets are found.
#
# Tools: TruffleHog (trufflesecurity/trufflehog)
# Coverage: Entire git history + current working tree
# =============================================================================

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
