# =============================================================================
# commops-staging — bounce webhook Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: commops-bounce-webhook
  namespace: commops-staging
  labels:
    app: commops-bounce-webhook
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: commops-bounce-webhook
  template:
    metadata:
      labels:
        app: commops-bounce-webhook
        environment: staging
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bounce-webhook
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          command: ['node', '/app/server.mjs']
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: '8080'
            - name: NODE_ENV
              value: staging
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app
          configMap:
            name: commops-bounce-webhook
        - name: tmp
          emptyDir: {}
