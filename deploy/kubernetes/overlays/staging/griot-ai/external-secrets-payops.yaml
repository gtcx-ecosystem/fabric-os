# =============================================================================
# griot-ai-staging — PayOps Flutterwave (primary) + Stripe (secondary)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: griot-ai-payops-flutterwave
  namespace: griot-ai-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: griot-ai
    gtcx.io/payops-provider: flutterwave
    gtcx.io/payops-rail: primary
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: griot-ai-aws-secrets
  target:
    name: griot-ai-payops-flutterwave
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/shared/staging/payops/flutterwave
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: griot-ai-payops-stripe
  namespace: griot-ai-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: griot-ai
    gtcx.io/payops-provider: stripe
    gtcx.io/payops-rail: secondary
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: griot-ai-aws-secrets
  target:
    name: griot-ai-payops-stripe
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/shared/staging/payops/stripe
