# =============================================================================
# griot-ai-staging — IRSA ServiceAccount + ESO SecretStore
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: griot-ai-sa
  namespace: griot-ai-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: griot-ai
    environment: staging
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::348389439381:role/gtcx-staging-griot-ai-secrets-role
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: griot-ai-aws-secrets
  namespace: griot-ai-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: griot-ai
    environment: staging
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: griot-ai-sa
