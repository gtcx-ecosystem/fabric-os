# =============================================================================
# markets-os-staging — ExternalSecret for staging API keys
# =============================================================================
# Syncs gtcx/markets-os/staging/api-keys from AWS SM into K8s secret.
# Expected keys: POSTGRES_PASSWORD, AUTH_JWT_SECRET, INTERNAL_SERVICE_TOKEN,
# ANTHROPIC_API_KEY, GTX_MARKETS_API_TOKEN.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: markets-os-secrets
  namespace: markets-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: markets-os
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: markets-os-aws-secrets
  target:
    name: markets-os-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/markets-os/staging/api-keys
