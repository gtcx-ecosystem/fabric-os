# =============================================================================
# markets-os-staging — ESO SecretStore
# =============================================================================
# Reads from AWS Secrets Manager (af-south-1) via IRSA.
# Prerequisite: IAM role from Terraform module.secrets (markets-os.tf).
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: markets-os-aws-secrets
  namespace: markets-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: markets-os
    environment: staging
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: markets-os-sa
