# =============================================================================
# nyota-ai-staging — PayOps shared Stripe ExternalSecret
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nyota-ai-payops-stripe
  namespace: nyota-ai-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: nyota-ai
    gtcx.io/payops-provider: stripe
    gtcx.io/payops-rail: secondary
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: nyota-ai-aws-secrets
  target:
    name: nyota-ai-payops-stripe
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/shared/staging/payops/stripe
