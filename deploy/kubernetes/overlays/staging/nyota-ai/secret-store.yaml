# =============================================================================
# nyota-ai-staging — IRSA ServiceAccount + ESO SecretStore
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nyota-ai-sa
  namespace: nyota-ai-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: nyota-ai
    environment: staging
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::348389439381:role/gtcx-staging-nyota-ai-secrets-role
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: nyota-ai-aws-secrets
  namespace: nyota-ai-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: nyota-ai
    environment: staging
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: nyota-ai-sa
