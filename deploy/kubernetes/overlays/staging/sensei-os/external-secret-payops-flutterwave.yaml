# =============================================================================
# sensei-os-staging — PayOps shared Flutterwave ExternalSecret (primary rail)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sensei-os-payops-flutterwave
  namespace: sensei-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: sensei-os
    gtcx.io/payops-provider: flutterwave
    gtcx.io/payops-rail: primary
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: sensei-os-aws-secrets
  target:
    name: sensei-os-payops-flutterwave
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/shared/staging/payops/flutterwave
