# =============================================================================
# sensei-os-staging — IRSA ServiceAccount + ESO SecretStore
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sensei-os-sa
  namespace: sensei-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: sensei-os
    environment: staging
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::348389439381:role/gtcx-staging-sensei-os-secrets-role
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: sensei-os-aws-secrets
  namespace: sensei-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: sensei-os
    environment: staging
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: sensei-os-sa
