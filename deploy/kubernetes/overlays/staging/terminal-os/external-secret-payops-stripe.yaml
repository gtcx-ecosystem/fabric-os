# =============================================================================
# terminal-os-staging — PayOps shared Stripe ExternalSecret
# =============================================================================
# Syncs gtcx/shared/staging/payops/stripe from AWS SM (XR-FABRIC-PAYOPS-001).
# Keys: STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PUBLISHABLE_KEY
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: terminal-os-payops-stripe
  namespace: terminal-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: terminal-os
    gtcx.io/payops-provider: stripe
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: terminal-os-aws-secrets
  target:
    name: terminal-os-payops-stripe
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/shared/staging/payops/stripe
