# =============================================================================
# terra-os-staging — CommOps shared SendGrid ExternalSecret (pilot)
# =============================================================================
# Syncs gtcx/shared/staging/commops/sendgrid from AWS SM (XR-FABRIC-COMMOPS-001).
# Keys: SENDGRID_API_KEY, sendgrid_api_key, sendgrid_from_email
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: terra-os-commops-sendgrid
  namespace: terraos
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: terra-os
    gtcx.io/commops-provider: sendgrid
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: terraos-aws-secrets
  target:
    name: terra-os-commops-sendgrid
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/shared/staging/commops/sendgrid
