# =============================================================================
# venture-os-staging — ExternalSecret for API keys
# =============================================================================
# Syncs gtcx/venture-os/staging/api-keys from AWS SM into K8s secret.
# Expected keys: VENTURE_WEBHOOK_SECRET, CLICKUP_*, LISTMONK_*
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: venture-os-secrets
  namespace: venture-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: venture-os
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: venture-os-aws-secrets
  target:
    name: venture-os-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/venture-os/staging/api-keys
