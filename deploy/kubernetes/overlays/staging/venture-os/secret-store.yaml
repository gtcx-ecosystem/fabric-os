# =============================================================================
# venture-os-staging — ESO SecretStore
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: venture-os-aws-secrets
  namespace: venture-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: venture-os
    environment: staging
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: venture-os-sa
