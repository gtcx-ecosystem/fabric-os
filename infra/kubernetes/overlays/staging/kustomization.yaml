# =============================================================================
# Staging Overlay
# =============================================================================
# Pre-production environment for:
#   - Integration testing before production promotion
#   - Pen-test target environment
#   - Chaos engineering experiments
#   - Load testing with realistic data volumes
#
# Principles:
#   - TESTED (P29): Runs full integration suite before promotion
#   - SECURE (P11): TLS-only ingress, NetworkPolicies, WAF
#   - RESILIENT (P12): HPA, PDB, multi-AZ ready
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gtcx-staging

resources:
  - ../../base
  - ingress.yaml
  - network-policies.yaml

nameSuffix: -staging

commonLabels:
  environment: staging

configMapGenerator:
  - name: gtcx-env
    behavior: merge
    literals:
      - GTCX_LOG_LEVEL=info
      - NODE_ENV=staging

# Secrets from external secret manager in staging
# secretGenerator configured via GitOps pipeline

images:
  - name: gtcx/agx
    newTag: v0.1.0-staging
  - name: gtcx/protocols
    newTag: v0.1.0-staging

# Staging resource limits (moderate)
patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "384Mi"
    target:
      kind: Deployment
      name: gtcx-agx
