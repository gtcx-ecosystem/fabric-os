packages:
  # Infrastructure
  - 'deploy/migrations'
  # Tools — Node ESM workspace packages with their own package.json,
  # tests, and (where applicable) Dockerfile + npm publication target.
  - 'platform/tools/anomaly-detector'
  - 'platform/tools/audit-flush'
  - 'platform/tools/audit-signer'
  - 'platform/tools/compliance-data'
  - 'platform/tools/compliance-gateway'
  - 'platform/tools/compliance-gateway-mcp'
  - 'platform/tools/control-plane'
  - 'platform/tools/deployment-guard'
  - 'platform/tools/docs-site'
  - 'platform/tools/eval-pipeline'
  - 'platform/tools/kyc-screening'
  - 'platform/tools/low-bandwidth'
  - 'platform/tools/replay-protection'
  - 'platform/tools/ussd-handler'

# ADR-019 exemptions — directories under `platform/tools/` that are NOT
# workspace packages by design. Each has a single-purpose surface
# (a validator script, a k6 load test, a markdown template) where
# pulling in a full package.json + dependency graph would be cargo-
# culting more than it would solve. Listed here so the workspace
# discipline is explicit and the boundary check has something to
# point at when a new dir lands without a justification.
#
#   platform/tools/chaos              — single .test.mjs invoked from validate.sh
#   platform/tools/contract-tests     — single .test.mjs cross-repo schema fixture
#   platform/tools/policy             — root pnpm check:* delegates (4 .mjs files)
#   platform/tools/scripts            — root pnpm script delegates + validators
#   platform/tools/kubectl-access     — bash script + audit log only
#   platform/tools/load-tests         — k6 .js files (separate runtime, not Node)
#   platform/tools/templates          — markdown templates only
